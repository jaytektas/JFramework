<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>

    <!-- Background: deep navy to near-black -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1C1C2E"/>
      <stop offset="100%" stop-color="#08080F"/>
    </linearGradient>

    <!-- Subtle inner highlight on background -->
    <radialGradient id="bgSheen" cx="38%" cy="32%" r="55%">
      <stop offset="0%"   stop-color="#1A2850" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- G body: electric blue → cyan -->
    <linearGradient id="gFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2196FF"/>
      <stop offset="60%"  stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>

    <!-- G face highlight (lighter strip along top-left edges) -->
    <linearGradient id="gShine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#80D0FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#80D0FF" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow behind the G -->
    <filter id="gGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.04
                0 0 0 0 0.44
                0 0 0 0 1
                0 0 0 0.55 0" result="blueGlow"/>
      <feMerge>
        <feMergeNode in="blueGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft drop-shadow under the G for depth -->
    <filter id="gShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10"
                    flood-color="#000020" flood-opacity="0.7"/>
    </filter>

    <!-- Node dot glow -->
    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip to rounded square -->
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="100"/>
    </clipPath>

  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  <rect width="512" height="512" rx="100" fill="url(#bgSheen)"/>

  <!-- ── Subtle UI-grid texture ── -->
  <g clip-path="url(#roundClip)" opacity="0.055" stroke="#6080FF" stroke-width="1" fill="none">
    <!-- Horizontal lines every 40 px -->
    <line x1="0" y1="96"  x2="512" y2="96"/>
    <line x1="0" y1="136" x2="512" y2="136"/>
    <line x1="0" y1="176" x2="512" y2="176"/>
    <line x1="0" y1="216" x2="512" y2="216"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="296" x2="512" y2="296"/>
    <line x1="0" y1="336" x2="512" y2="336"/>
    <line x1="0" y1="376" x2="512" y2="376"/>
    <line x1="0" y1="416" x2="512" y2="416"/>
    <!-- Vertical lines every 40 px -->
    <line x1="96"  y1="0" x2="96"  y2="512"/>
    <line x1="136" y1="0" x2="136" y2="512"/>
    <line x1="176" y1="0" x2="176" y2="512"/>
    <line x1="216" y1="0" x2="216" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="296" y1="0" x2="296" y2="512"/>
    <line x1="336" y1="0" x2="336" y2="512"/>
    <line x1="376" y1="0" x2="376" y2="512"/>
    <line x1="416" y1="0" x2="416" y2="512"/>
  </g>

  <!-- ── G mark — glow layer (blurred, drawn first) ── -->
  <g filter="url(#gGlow)" opacity="1">
    <rect x="110" y="110" width="292" height="52" rx="10" fill="#0A84FF"/>
    <rect x="110" y="110" width="52"  height="292" rx="10" fill="#0A84FF"/>
    <rect x="110" y="350" width="292" height="52"  rx="10" fill="#00C8FF"/>
    <rect x="208" y="228" width="194" height="52"  rx="10" fill="#0A84FF"/>
    <rect x="350" y="228" width="52"  height="174" rx="10" fill="#00C8FF"/>
  </g>

  <!-- ── G mark — body (solid, with gradient) ── -->
  <g filter="url(#gShadow)">
    <!-- Top bar -->
    <rect x="110" y="110" width="292" height="52" rx="10" fill="url(#gFill)"/>
    <!-- Left bar -->
    <rect x="110" y="110" width="52"  height="292" rx="10" fill="url(#gFill)"/>
    <!-- Bottom bar -->
    <rect x="110" y="350" width="292" height="52"  rx="10" fill="url(#gFill)"/>
    <!-- Mid shelf (inner horizontal — the "shelf" of the G) -->
    <rect x="208" y="228" width="194" height="52"  rx="10" fill="url(#gFill)"/>
    <!-- Right bar (lower — connects shelf to bottom bar) -->
    <rect x="350" y="228" width="52"  height="174" rx="10" fill="url(#gFill)"/>
  </g>

  <!-- ── G mark — shine overlay ── -->
  <g opacity="1">
    <rect x="110" y="110" width="292" height="52" rx="10" fill="url(#gShine)"/>
    <rect x="110" y="110" width="52"  height="292" rx="10" fill="url(#gShine)"/>
    <rect x="208" y="228" width="194" height="52"  rx="10" fill="url(#gShine)"/>
  </g>

  <!-- ── Connector nodes — bright dots at structural corners ── -->
  <g filter="url(#dotGlow)" fill="#60E0FF">
    <!-- Top-left corner of G -->
    <circle cx="136" cy="136" r="9"/>
    <!-- Top-right corner of top bar -->
    <circle cx="376" cy="136" r="9"/>
    <!-- Bottom-left corner -->
    <circle cx="136" cy="376" r="9"/>
    <!-- Bottom-right corner -->
    <circle cx="376" cy="376" r="9"/>
    <!-- Mid-shelf left join -->
    <circle cx="208" cy="254" r="7"/>
    <!-- Mid-shelf / right-bar corner -->
    <circle cx="376" cy="254" r="9"/>
  </g>

  <!-- ── Edge vignette to give the background more depth ── -->
  <rect width="512" height="512" rx="100"
        fill="none" stroke="#000014" stroke-width="28" stroke-opacity="0.55"/>

</svg>
